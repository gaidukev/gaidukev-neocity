name: Update Reading List Using Hardcover API

on: 
  schedule:
    - cron: "0 6 * * 1" # Runs on Monday at 6 AM UTC
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions: 
      contents: write  # by default, the VM will only have read -- need to give it write
    
    steps:
      - name: Checkout repository # the github action will not have access to repository files otherwise
        uses: actions/checkout@v4

      - name: Set up Node.js # download node to run the script
        uses: actions/setup-node@v4
        with:
          node-version: "22.11.0"
      
      - name: Run Hardcover sync script # call the script
        env:
          HARDCOVER_API_KEY: ${{ secrets.HARDCOVER_API_KEY }}
        run: node scripts/sync_books.mjs

      - name: Commit updated books.json # update books.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add books.json
          git diff --staged --quiet || git commit -m "Sync books from Hardcover"
          git push