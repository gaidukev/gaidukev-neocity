<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Matt & Chai</title>
    <link href="./styles/style.css" rel="stylesheet" type="text/css" media="all">
    <link href="./styles/style-books.css" rel="stylesheet" type="text/css" media="all">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_left,arrow_right,moon_stars,star,star_half" />

    <script>
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.type = "text/css";
      link.media = "all";

      const isNight = (!document.cookie || document.cookie.includes('night'))
      link.href = isNight ? "./styles/style-night.css" : "./styles/style-day.css";

      document.head.appendChild(link);
    </script>
  </head>
  <body>
  
    <script type="text/javascript" src="./header.js"></script>
    <script type="module" src="./books.js"></script>
    <script src="//unpkg.com/alpinejs" defer></script>

    <site-header></site-header>

    <div x-data="booksPage()" x-cloak>
      <canvas x-ref="colorCanvas" width="150" height="150" style="display: none;"></canvas>

      <section>
        <div class="content">
          <h1>Recent Favorites</h1>
          <div class="scrollable-content">
            <span
              class="material-symbols-outlined left-arrow arrow"
              id="favorites-left-arrow"
              :style="{ opacity: arrowOpacity(favoritesIndex, recentFavorites, 'left') }"
              @click="scrollLeft('favorites')"
            >arrow_left</span>

            <div id="favorites-content">
              <template x-for="(book, i) in recentFavorites" :key="book.title + book.author">
                <div class="slide"  :style="carouselStyle(favoritesIndex, i)">
                  <div class="cover">
                    <img :src="book.cover_url" :alt="book.title">
                  </div>
                  <div class="details" :style="detailsBgStyle(book)">
                    <h3 class="title" x-text="book.title"></h3>
                    <h3 class="author" :style="accentStyle(book)" x-text="book.author"></h3>
                    <template x-if="book.rating">
                      <div class="rating">
                        <template x-for="(star, i) in ratingStars(book.rating)" :key="i">
                          <span class="material-symbols-outlined" :style="accentStyle(book)" x-text="star"></span>
                        </template>
                        <span x-text="book.rating"></span>
                      </div>
                    </template>
                    <div class="tags">
                      <template x-for="tag in book.tags" :key="tag">
                        <span class="tag" :style="tagStyle(book)" x-text="tag"></span>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
            </div>

            <span
              class="material-symbols-outlined right-arrow arrow"
              id="favorites-right-arrow"
              :style="{ opacity: arrowOpacity(favoritesIndex, recentFavorites, 'right') }"
              @click="scrollRight('favorites', recentFavorites)"
            >arrow_right</span>
          </div>
        </div>
      </section>

      <section>
        <div class="content">
          <h1>Reading Now</h1>
          <div class="scrollable-content">
            <span
              class="material-symbols-outlined left-arrow arrow"
              id="reading-now-left-arrow"
              :style="{ opacity: arrowOpacity(readingIndex, currentlyReading, 'left') }"
              @click="scrollLeft('reading')"
            >arrow_left</span>

            <div id="reading-now-content">
              <template x-for="(book, i) in currentlyReading" :key="book.title + book.author">
                <div class="slide"  :style="carouselStyle(readingIndex, i)">
                  <div class="cover">
                    <img :src="book.cover_url" :alt="book.title">
                  </div>
                  <div class="details" :style="detailsBgStyle(book)">
                    <h3 class="title" x-text="book.title"></h3>
                    <h3 class="author" :style="accentStyle(book)" x-text="book.author"></h3>
                    <template x-if="book.rating">
                      <div class="rating">
                        <template x-for="(star, i) in ratingStars(book.rating)" :key="i">
                          <span class="material-symbols-outlined" :style="accentStyle(book)" x-text="star"></span>
                        </template>
                        <span x-text="book.rating"></span>
                      </div>
                    </template>
                    <div class="tags">
                      <template x-for="tag in book.tags" :key="tag">
                        <span class="tag" :style="tagStyle(book)" x-text="tag"></span>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
            </div>

            <span
              class="material-symbols-outlined right-arrow arrow"
              id="reading-now-right-arrow"
              :style="{ opacity: arrowOpacity(readingIndex, currentlyReading, 'right') }"
              @click="scrollRight('reading', currentlyReading)"
            >arrow_right</span>
          </div>
        </div>
      </section>

      <section>
        <div class="content">
          <h1>All Books I've Read</h1>
          <div class="unscrollable-content">
            <div id="books-read-content">
              <template x-for="book in allBooks" :key="book.title + book.author">
                <div
                  class="slide slide-allbooks"
                  @mouseenter="book.showTooltip = true"
                  @mouseleave="book.showTooltip = false"
                >
                  <div class="cover">
                    <img :src="book.cover_url" :alt="book.title">
                  </div>
                  <div
                    class="tooltip"
                    :class="{ 'tooltip-show': book.showTooltip }"
                    :style="tooltipBgStyle(book)"
                  >
                    <h3 class="title" x-text="book.title"></h3>
                    <h3 class="author" :style="accentStyle(book)" x-text="book.author"></h3>
                    <template x-if="book.rating">
                      <div class="rating">
                        <template x-for="(star, i) in ratingStars(book.rating)" :key="i">
                          <span class="material-symbols-outlined" :style="accentStyle(book)" x-text="star"></span>
                        </template>
                      </div>
                      <div class="rating-div-container" :style="accentStyle(book)" x-text="book.rating"></div>
                    </template>
                    <div class="tags">
                      <template x-for="tag in book.tags" :key="tag">
                        <span class="tag" :style="tagStyle(book)" x-text="tag"></span>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </section>
    </div>

  </body>
</html>
