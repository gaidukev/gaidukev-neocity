<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Matt & Chai</title>
    <link href="./styles/style.css" rel="stylesheet" type="text/css" media="all">
    <link href="./styles/style-wordle.css" rel="stylesheet" type="text/css" media="all">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_left,arrow_right,moon_stars,star,star_half" />

    <script>
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.type = "text/css";
      link.media = "all";

      const isNight = (!document.cookie || document.cookie.includes('night'))
      link.href = isNight ? "./styles/style-night.css" : "./styles/style-day.css";

      document.head.appendChild(link);
    </script>
  </head>
  <body>
    <script type="text/javascript" src="./header.js"></script>
    <script src="//unpkg.com/alpinejs" defer></script>
    <site-header></site-header>

    <div x-data="wordle()" @keydown.window="handleKey($event)" id="wordle-container">
      <!-- Board -->
      <div id="wordle-guesses-container">
        <template x-for="(row, rowIndex) in boardRows" :key="rowIndex">
          <div class="guess-letters-row">
            <template x-for="(tile, colIndex) in row" :key="colIndex">
              <div class="letter-container" :class="tile.state">
                <span x-text="tile.letter"></span>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- Message -->
      <div id="wordle-message" x-show="message" x-text="message"></div>

      <!-- On-screen keyboard -->
      <div id="wordle-keyboard">
        <template x-for="keyRow in keyboard" :key="keyRow.join('')">
          <div class="keyboard-row">
            <template x-for="key in keyRow" :key="key">
              <button
                @click="handleKey({ key })"
                class="wordle-keyboard-key"
                
                x-text="key"
              ></button>
            </template>
          </div>
        </template>
      </div>

    </div>

    <script>
      // load today's word from word.json (populated by a script)
      async function todaysWord() {
        const { randomWord } = await fetch('data/wordle/word.json').then(r => r.json());
        return randomWord;
      }

      // load the dictionary of all valid five-letter words
      async function getDictionary() {
        const text = await fetch('data/wordle/five-letter-dictionary.txt').then(r => r.text());
        return text.split('\n').map(w => w.trim().toUpperCase()).filter(w => w.length === 5);
      }

      // takes the answer and a guess (both strings)
      // returns an array of states
      function evaluate(guess, answer) {
        const result = [];
        const answerLetterArray = answer.split("");
        const guessLetterArray = guess.split('');
        for (let i = 0; i < guessLetterArray.length; i++) {
          if (guess[i] === answer[i]) {
            result[i] = STATE_RANK.correct;
          } else if (answerLetterArray.includes(guess[i])) {
            // check if this result should light up yellow

            // check only how many times this letter has already been present
            // and not marked "present"
            const present_so_far = guessLetterArray.filter((letter, index) => result[index] === STATE_RANK.present && letter == guessLetterArray[i]).length;
            const count_present_total = answerLetterArray.filter((answerLetter, index) => (answerLetter === guessLetterArray[i]) && (guessLetterArray[index] != guessLetterArray[i])).length;

            // should light up yellow if:
            // 1. the letter exists in the answer
            // 2. the guess at that index isn't that letter as well
            // 3. at i, there haven't already enough occurrences of this letter 
            // e.g. this is the fourth occurrence. 
            // there's already been 1 green and 2 yellows. 
            // there are three occurrences of that letter in the whole word
            // we do NOT need to highlight the fourth occurrence yellow.
            result[i] = present_so_far < count_present_total ? STATE_RANK.present : STATE_RANK.absent;

          } else {
            result[i] = STATE_RANK.absent;
          }
        
        }
        return result;
      }

      const STATE_RANK = { correct: "correct", present: "present", absent: "absent", '': 0 };

      function wordle() {
        return {
          answer: '',
          guesses: [],       // array of { letters: string[], states: string[] }
          current: '',
          gameOver: false,
          message: '',
          dictionary: [],

          async init() {
            [this.answer, this.dictionary] = await Promise.all([todaysWord(), getDictionary()]);
          },

          keyboard: [
            ['Q','W','E','R','T','Y','U','I','O','P'],
            ['A','S','D','F','G','H','J','K','L'],
            ['Enter','Z','X','C','V','B','N','M','⌫'],
          ],

          // Build a 6x5 grid of { letter, state } for rendering
          get boardRows() {
            const rows = [];
            for (let r = 0; r < 6; r++) {
              if (r < this.guesses.length) {
                rows.push(this.guesses[r].letters.map((l, i) => ({ letter: l, state: this.guesses[r].states[i] })));
              } else if (r === this.guesses.length && !this.gameOver) {
                const row = [];
                for (let c = 0; c < 5; c++) row.push({ letter: this.current[c] || '', state: 'active' });
                rows.push(row);
              } else {
                rows.push(Array(5).fill({ letter: '', state: '' }));
              }
            }
            return rows;
          },

          handleKey(e) {
            if (this.gameOver) return;
            const key = e.key;
            if (key === 'Enter') { this.submit(); return; }
            if (key === 'Backspace' || key === '⌫') { this.current = this.current.slice(0, -1); return; }
            if (/^[a-zA-Z]$/.test(key) && this.current.length < 5) {
              this.current += key.toUpperCase();
            }
          },

          submit() {
            if (this.current.length < 5) { return; }
            const letters = this.current.split('');
            
            // clear the message
            this.message = '';

            // check if guess is a valid word
            const isGuessValid = this.dictionary.includes(this.current);
            if (isGuessValid) {
              const states = evaluate(this.current, this.answer);
              this.guesses.push({ letters, states });
              if (this.current === this.answer) {
                this.message = 'You got it!';
                this.gameOver = true;
              } else if (this.guesses.length === 6) {
                this.message = this.answer;
                this.gameOver = true;
              }
            } else {
              this.message = 'Invalid word.'
            }
            this.current = '';
          },
        };
      }
    </script>

  </body>

</html>
